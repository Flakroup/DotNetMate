stages:
  - build
  - test
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"
  CONFIGURATION: "Release"
  GIT_DEPTH: "0"
  GIT_SUBMODULE_STRATEGY: none
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  GIT_LFS_SKIP_SMUDGE: "1"
  GIT_TERMINAL_PROMPT: "0"
  GCM_INTERACTIVE: "false"

  # Manual pipeline action selector (Run pipeline)
  ACTION:
    value: "build"
    options:
      - "build"
      - "test"
      - "publish"
      - "cleanup"
      - "all"
    description: "Action to run (NUKE target: Compile/Test/Publish/Clean)"

# Default settings for all jobs (Shell executor on JOHNNYABQPC)
default:
  tags:
    - johnnyabqpc
  before_script:
    # 1. Top-level submodules - init + auth + update (non-recursive)
    - git submodule init
    - git config submodule.DevConfigs.url "https://gitlab-ci-token:$env:CI_JOB_TOKEN@gitlab.com/flakroup/devconfigs.git"
    - git config submodule.FEx.url "https://gitlab-ci-token:$env:CI_JOB_TOKEN@gitlab.com/flakroup/fex.git"
    - git config submodule.FEx.WakaTime.url "https://gitlab-ci-token:$env:CI_JOB_TOKEN@gitlab.com/flakroup/FEx.WakaTime.git"
    - git submodule update
    # 2. Nested submodules inside FEx and FEx.WakaTime (DevConfigs)
    - git -C FEx submodule init
    - git -C FEx config submodule.DevConfigs.url "https://gitlab-ci-token:$env:CI_JOB_TOKEN@gitlab.com/flakroup/devconfigs.git"
    - git -C FEx submodule update
    - git -C FEx.WakaTime submodule init
    - git -C FEx.WakaTime config submodule.DevConfigs.url "https://gitlab-ci-token:$env:CI_JOB_TOKEN@gitlab.com/flakroup/devconfigs.git"
    - git -C FEx.WakaTime submodule update
    - pwsh --version
    - dotnet --version

######################################################################
# GЕ‚Гіwna logika CI вЂ“ spiД™ta z targetami NUKE z build/Build.cs
#
# - zwykЕ‚y push na dowolny branch в‰  main/master  в†’ Compile (build)
# - pipeline merge requestu                        в†’ Test (+ Benchmark via Trigger)
# - push na main/master (merge do main/master)    в†’ Publish (Pack + Test + Compile)
######################################################################

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# BUILD (push na feature brancha)
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

build:
  stage: build
  script:
    - 'echo "рџ”Ё Building DotNetMate (NUKE target: Compile)..."'
    - pwsh ./build.ps1 Compile
  rules:
    # ZwykЕ‚e pipeline'y z push'a, ale nie na main/master
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master"'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmiennД… ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "build" || $ACTION == "all")'
      when: on_success
    - when: never

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# TESTY + BENCHMARK (merge request)
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

test:
  stage: test
  script:
    - 'echo "рџ§Є Running tests and benchmarks (NUKE target: Test -> triggers Benchmark)..."'
    - pwsh ./build.ps1 Test
  artifacts:
    when: always
    paths:
      - artifacts/test-results/*.trx
      - BenchmarkDotNet.Artifacts/results/
    reports:
      junit: artifacts/test-results/*.trx
    expire_in: 30 days
  coverage: '/Total\s+\|\s+(\d+\.?\d*)%/'
  rules:
    # Pipeline merge requestu
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmiennД… ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "test" || $ACTION == "all")'
      when: on_success
    - when: never

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# PUBLISH (merge do main/master)
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

publish:
  stage: publish
  script:
    - 'echo "рџљЂ Publishing to NuGet.org (NUKE target: Publish)..."'
    - pwsh -Command 'if (-not $env:NuGetOrgApiKey) { Write-Error "NuGetOrgApiKey environment variable is not set"; exit 1 }'
    - pwsh ./build.ps1 Publish --configuration Release --nuget-source "https://api.nuget.org/v3/index.json" --nuget-api-key "$NuGetOrgApiKey"
  rules:
    # Push na main/master (w praktyce merge do gЕ‚Гіwnej gaЕ‚Д™zi) - automatyczne uruchomienie
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmiennД… ACTION
    # Uwaga: na nie-protected ref job siД™ uruchomi, ale failnie (brak NuGetOrgApiKey)
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "publish" || $ACTION == "all")'
      when: on_success
    # W pozostaЕ‚ych przypadkach w ogГіle nie pokazuj joba w pipeline
    - when: never
  environment:
    name: production
    url: https://www.nuget.org/packages/DotNetMateTool

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# UTILITY: rД™czny cleanup
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

cleanup:
  stage: .post
  script:
    - echo "рџ§№ Cleaning up artifacts..."
    - pwsh ./build.ps1 Clean
  rules:
    # Cleanup z UI / API: kontrolowane zmiennД… ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "cleanup" || $ACTION == "all")'
      when: on_success
    # W pozostaЕ‚ych przypadkach w ogГіle nie pokazuj joba w pipeline
    - when: never
