stages:
  - build
  - test
  - publish

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"
  CONFIGURATION: "Release"
  GIT_DEPTH: "0"
  GIT_SUBMODULE_STRATEGY: none
  GIT_SUBMODULE_FORCE_HTTPS: "true"
  GIT_LFS_SKIP_SMUDGE: "1"
  GIT_TERMINAL_PROMPT: "0"

  # Manual pipeline action selector (Run pipeline)
  ACTION:
    value: "build"
    options:
      - "build"
      - "test"
      - "publish"
      - "cleanup"
      - "all"
    description: "Action to run (NUKE target: Compile/Test/Publish/Clean)"

# Default settings for all jobs
default:
  image: mcr.microsoft.com/dotnet/sdk:10.0
  tags:
    - johnnyabqpc
  hooks:
    pre_get_sources_script:
      - git config --global core.longPaths true
      - git config --global protocol.file.allow always
  before_script:
    - echo "🔧 Checking environment..."
    - git config --global protocol.file.allow always
    - git config --global fetch.recurseSubmodules false
    - git submodule init
    - git submodule sync
    - git submodule update
    - git submodule foreach --recursive 'git submodule init && git submodule sync && git submodule update'
    - pwsh --version
    - dotnet --version
    - echo "✅ Environment ready"

######################################################################
# Główna logika CI – spięta z targetami NUKE z build/Build.cs
#
# - zwykły push na dowolny branch ≠ main/master  → Compile (build)
# - pipeline merge requestu                        → Test (+ Benchmark via Trigger)
# - push na main/master (merge do main/master)    → Publish (Pack + Test + Compile)
######################################################################

# ════════════════════════════════════════════
# BUILD (push na feature brancha)
# ════════════════════════════════════════════

build:
  stage: build
  script:
    - 'echo "🔨 Building DotNetMate (NUKE target: Compile)..."'
    - pwsh ./build.ps1 Compile
  rules:
    # Zwykłe pipeline'y z push'a, ale nie na main/master
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master"'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmienną ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "build" || $ACTION == "all")'
      when: on_success
    - when: never

# ════════════════════════════════════════════
# TESTY + BENCHMARK (merge request)
# ════════════════════════════════════════════

test:
  stage: test
  script:
    - 'echo "🧪 Running tests and benchmarks (NUKE target: Test -> triggers Benchmark)..."'
    - pwsh ./build.ps1 Test
  artifacts:
    when: always
    paths:
      - artifacts/test-results/*.trx
      - BenchmarkDotNet.Artifacts/results/
    reports:
      junit: artifacts/test-results/*.trx
    expire_in: 30 days
  coverage: '/Total\s+\|\s+(\d+\.?\d*)%/'
  rules:
    # Pipeline merge requestu
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmienną ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "test" || $ACTION == "all")'
      when: on_success
    - when: never

# ════════════════════════════════════════════
# PUBLISH (merge do main/master)
# ════════════════════════════════════════════

publish:
  stage: publish
  script:
    - 'echo "🚀 Publishing to NuGet.org (NUKE target: Publish)..."'
    - pwsh -Command 'if (-not $env:NuGetOrgApiKey) { Write-Error "NuGetOrgApiKey environment variable is not set"; exit 1 }'
    - pwsh ./build.ps1 Publish --configuration Release --nuget-source "https://api.nuget.org/v3/index.json" --nuget-api-key "$NuGetOrgApiKey"
  rules:
    # Push na main/master (w praktyce merge do głównej gałęzi) - automatyczne uruchomienie
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master")'
      when: on_success
    # "Run pipeline" z UI / API: kontrolowane zmienną ACTION
    # Uwaga: na nie-protected ref job się uruchomi, ale failnie (brak NuGetOrgApiKey)
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "publish" || $ACTION == "all")'
      when: on_success
    # W pozostałych przypadkach w ogóle nie pokazuj joba w pipeline
    - when: never
  environment:
    name: production
    url: https://www.nuget.org/packages/DotNetMateTool

# ════════════════════════════════════════════
# UTILITY: ręczny cleanup
# ════════════════════════════════════════════

cleanup:
  stage: .post
  script:
    - echo "🧹 Cleaning up artifacts..."
    - pwsh ./build.ps1 Clean
  rules:
    # Cleanup z UI / API: kontrolowane zmienną ACTION
    - if: '($CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "api") && ($ACTION == "cleanup" || $ACTION == "all")'
      when: on_success
    # W pozostałych przypadkach w ogóle nie pokazuj joba w pipeline
    - when: never
